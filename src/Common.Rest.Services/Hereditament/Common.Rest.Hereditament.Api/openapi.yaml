openapi: 3.0.0
info:
  title: Hereditament API
  description: REST API for managing hereditament records with CRUD operations, advanced search, and soft/permanent delete
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/rajamahanthy/Common.Rest.Api
  license:
    name: MIT

servers:
  - url: https://localhost:5011/api/v1
    description: Development server
  - url: http://localhost:5010/api/v1
    description: Development server (HTTP)

tags:
  - name: Hereditament
    description: Hereditament CRUD operations
  - name: Search
    description: Search and filter hereditament records
  - name: Lifecycle
    description: Hereditament lifecycle management (delete, restore)

paths:
  /Hereditament:
    get:
      tags: [Hereditament]
      summary: Get all hereditaments with pagination
      operationId: getAllHereditaments
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
        - name: X-Correlation-ID
          in: header
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Paginated list of hereditaments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedApiResponse'
    post:
      tags: [Hereditament]
      summary: Create a new hereditament
      operationId: createHereditament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUpdateHereditament'
      responses:
        '201':
          description: Hereditament created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /Hereditament/{id}:
    get:
      tags: [Hereditament]
      summary: Get hereditament by ID
      operationId: getHereditamentById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: X-Correlation-ID
          in: header
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Hereditament found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Hereditament]
      summary: Update a hereditament
      operationId: updateHereditament
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUpdateHereditament'
      responses:
        '200':
          description: Hereditament updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Lifecycle]
      summary: Soft delete a hereditament
      operationId: deleteHereditament
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Hereditament soft deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

  /Hereditament/{id}/permanent:
    delete:
      tags: [Lifecycle]
      summary: Permanently delete a hereditament
      operationId: permanentlyDeleteHereditament
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Hereditament permanently deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

  /Hereditament/search/advanced:
    get:
      tags: [Search]
      summary: Advanced search for hereditaments
      operationId: advancedSearchHereditament
      parameters:
        - name: name
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: effectiveFrom
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedApiResponse'

  /Hereditament/count:
    get:
      tags: [Search]
      summary: Get total hereditament count
      operationId: getHereditamentCount
      responses:
        '200':
          description: Total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: integer
                    description: Total count of hereditaments
                  correlationId:
                    type: string
                    format: uuid

components:
  schemas:
    CreateUpdateHereditament:
      type: object
      required:
        - name
        - effectiveFrom
      properties:
        name:
          type: string
        effectiveFrom:
          type: string
          format: date
        addressId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          description: Hereditament status (Draft, Active, Removed)
          example: Draft
    HereditamentDto:
      type: object
      required:
        - name
        - status
        - effectiveFrom
      properties:
        name:
          type: string
        status:
          type: string
        effectiveFrom:
          type: string
          format: date
        addressId:
          type: string
          format: uuid
          nullable: true
    HereditamentDocumentDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hereditamentDetails:
          $ref: '#/components/schemas/HereditamentDto'
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          oneOf:
            - $ref: '#/components/schemas/HereditamentDocumentDto'
            - type: array
          nullable: true
        correlationId:
          type: string
          format: uuid
    PagedApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HereditamentDocumentDto'
            pageNumber:
              type: integer
            pageSize:
              type: integer
            totalRecords:
              type: integer
            totalPages:
              type: integer
        correlationId:
          type: string
          format: uuid
  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
              correlationId:
                type: string
                format: uuid
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              message:
                type: string
              errors:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string
              correlationId:
                type: string
                format: uuid
